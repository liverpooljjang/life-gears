<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life Gears</title>
    <!-- 세련된 디자인 폰트 (Pretendard) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        /* 라이트 모드 */
        :root {
            --bg-color: #f4f6f8;
            --text-color: #212529;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --input-bg: #f8fafc;
            --btn-bg: #e2e8f0;
            --btn-text: #475569;
            --modal-overlay: rgba(0,0,0,0.4);
            --checked-color: #94a3b8;
            --gear-shadow: drop-shadow(0 4px 8px rgba(0,0,0,0.08));
            --gear-name-bg: rgba(255, 255, 255, 0.95);
            --delete-bg: #fee2e2;
            --delete-text: #ef4444;
            --accent-checked: #5c7cfa;
        }

        /* 다크 모드 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f1115;
                --text-color: #f1f5f9;
                --card-bg: #1e222a;
                --border-color: #2a313c;
                --input-bg: #15181e;
                --btn-bg: #2a313c;
                --btn-text: #94a3b8;
                --modal-overlay: rgba(0,0,0,0.8);
                --checked-color: #64748b;
                --gear-shadow: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
                --gear-name-bg: rgba(30, 34, 42, 0.9);
                --delete-bg: #3f1d1d;
                --delete-text: #f87171;
                --accent-checked: #748ffc;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            text-align: center;
            padding: 40px 20px 10px;
        }

        header h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 15px;
            color: var(--btn-text);
            line-height: 1.5;
            word-break: keep-all;
        }

        /* 톱니바퀴 2열 고정 그리드 레이아웃 */
        .gears-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px 10px;
            justify-items: center;
            width: 100%;
            max-width: 280px;
            margin: 30px auto 40px;
        }

        .gear-wrapper {
            position: relative;
            width: 120px;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
        }

        .gear-svg {
            width: 100px;
            height: 100px;
            fill: none;
            stroke-width: 8;
            transition: all 0.5s ease;
            filter: var(--gear-shadow);
        }

        .gear-name {
            position: absolute;
            bottom: 5px;
            font-size: 14px;
            font-weight: 700;
            background: var(--gear-name-bg);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }

        .spin-cw { animation: spinCW 8s linear infinite; }
        .spin-ccw { animation: spinCCW 8s linear infinite; }
        
        .stopped .gear-svg {
            animation-play-state: paused !important;
            stroke: var(--checked-color) !important;
            filter: none;
            opacity: 0.5;
        }
        .stopped .gear-name { color: var(--btn-text); opacity: 0.8; }

        @keyframes spinCW { 100% { transform: rotate(360deg); } }
        @keyframes spinCCW { 100% { transform: rotate(-360deg); } }

        /* 동력 상태 제어 영역 */
        .controls {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 24px;
            margin-bottom: 40px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .controls-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .controls h3 { font-size: 17px; font-weight: 700; color: var(--text-color); }
        
        .add-gear-btn {
            background: var(--text-color);
            color: var(--bg-color);
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .add-gear-btn:active { opacity: 0.7; }

        .toggle-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .toggle-btn {
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: var(--btn-bg);
            color: var(--btn-text);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .toggle-btn.active {
            background: var(--text-color);
            color: var(--bg-color);
        }

        /* 모달 및 체크리스트 UI */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--modal-overlay);
            display: flex; align-items: flex-end;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: var(--bg-color);
            width: 100%; height: 88vh;
            border-radius: 28px 28px 0 0;
            padding: 30px 20px;
            display: flex; flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
        }
        .modal-overlay.show .modal-content { transform: translateY(0); }

        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color);
        }
        .modal-title { font-size: 24px; font-weight: 800; color: var(--text-color); }
        .close-btn { background: none; border: none; color: var(--btn-text); font-size: 32px; cursor: pointer; line-height: 1; }

        /* 입력 영역 */
        .input-group {
            display: flex; gap: 10px; margin-bottom: 15px;
        }
        .input-group input[type="text"] {
            flex: 1; min-width: 0; padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 16px; font-family: inherit;
        }
        .input-group input[type="text"]:focus { outline: 2px solid var(--text-color); border-color: transparent;}
        
        .input-group button {
            white-space: nowrap; flex-shrink: 0; padding: 0 24px;
            border-radius: 16px; border: none;
            background: var(--text-color); color: var(--bg-color);
            font-weight: 700; font-size: 16px; font-family: inherit;
        }

        /* 적용 옵션 토글 스타일 */
        .checklist-option {
            display: flex; align-items: center; gap: 10px;
            font-size: 14px; color: var(--btn-text); font-weight: 600;
            margin-bottom: 25px; padding-left: 5px;
        }
        .checklist-option input[type="checkbox"] { 
            accent-color: var(--accent-checked);
            transform: scale(1.3); 
            cursor: pointer; 
        }

        /* 리스트 스타일 */
        .item-list { list-style: none; overflow-y: auto; flex: 1; padding-bottom: 20px; }
        .item-list li {
            background: var(--card-bg); padding: 16px 20px; border-radius: 18px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .item-content { display: flex; align-items: center; gap: 16px; flex: 1; overflow: hidden; }
        
        /* 세련된 커스텀 원형 체크박스 */
        .custom-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 24px; height: 24px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            outline: none; cursor: pointer; position: relative;
            background-color: var(--input-bg);
            flex-shrink: 0; transition: all 0.2s ease;
        }
        .custom-checkbox:checked {
            background-color: var(--accent-checked);
            border-color: var(--accent-checked);
        }
        .custom-checkbox:checked::after {
            content: ''; position: absolute;
            top: 4px; left: 8px;
            width: 4px; height: 9px;
            border: solid #ffffff; 
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg);
        }

        .item-text { font-size: 16px; font-weight: 500; word-break: break-word; transition: all 0.2s; color: var(--text-color); }
        .item-text.checked { text-decoration: line-through; color: var(--checked-color); opacity: 0.6; }

        /* 삭제 버튼 */
        .delete-btn {
            background: var(--delete-bg); color: var(--delete-text); border: none;
            border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; flex-shrink: 0;
            font-family: inherit;
        }
        .delete-btn:active { opacity: 0.7; }

        .delete-gear-btn {
            width: 100%; padding: 18px; background: transparent; color: var(--delete-text);
            border: 2px dashed var(--border-color); border-radius: 18px; font-size: 15px; font-weight: 700; margin-top: 10px;
            font-family: inherit; cursor: pointer;
        }

        .status-message { text-align: center; padding: 0 20px 20px; font-size: 15px; color: var(--btn-text); line-height: 1.6; }
    </style>
</head>
<body>

    <header>
        <h1>Life Gears</h1>
        <p>일부가 멈추더라도,<br>당신의 인생은 계속 돌아갑니다.</p>
    </header>

    <div class="gears-container" id="gears-container">
        <!-- 톱니바퀴 동적 생성 -->
    </div>

    <div class="status-message" id="status-msg"></div>

    <div class="controls">
        <div class="controls-header">
            <h3>동력 상태 제어</h3>
            <button class="add-gear-btn" onclick="addNewGear()">+ 기어 추가</button>
        </div>
        <div class="toggle-group" id="toggle-group">
            <!-- 토글 버튼 동적 생성 -->
        </div>
    </div>

    <!-- 데이터 관리 모달 -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modal-title">카테고리</div>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            
            <!-- 항목 추가 영역 -->
            <div class="input-group">
                <input type="text" id="item-input" placeholder="새로운 내용을 입력하세요" onkeypress="handleKeyPress(event)">
                <button onclick="addItem()">추가</button>
            </div>
            <div class="checklist-option">
                <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                    <input type="checkbox" id="use-checklist" checked> 이 항목에 체크리스트 기능 사용
                </label>
            </div>

            <ul class="item-list" id="item-list">
                <!-- 리스트 아이템 동적 생성 -->
            </ul>

            <button class="delete-gear-btn" onclick="deleteCurrentGear()">이 톱니바퀴 완전히 삭제하기</button>
        </div>
    </div>

    <script>
        // 처음 4개 색상을 근본 색상(민트, 코랄, 라벤더, 피치)으로 맨 앞에 고정 배치
        const colorPalette = [
            '#B5EAD7', '#FFB7B2', '#C7CEEA', '#FFDAC1', 
            '#FF9AA2', '#E2F0CB', '#9FD8DF', '#F3C5FF', 
            '#D4F0F0', '#FFC8A2', '#B9F2FF', '#D5AAFF'
        ];
        
        let lifeData = JSON.parse(localStorage.getItem('lifeGearsDataV2')) || [
            { id: 'gear_1', name: '루틴', active: true, color: '#B5EAD7', items: [] },
            { id: 'gear_2', name: '해야할 일', active: true, color: '#FFB7B2', items: [] },
            { id: 'gear_3', name: '하고싶은 일', active: true, color: '#C7CEEA', items: [] },
            { id: 'gear_4', name: '신앙', active: true, color: '#FFDAC1', items: [] }
        ];

        let currentGearId = '';

        function init() {
            checkDailyReset();
            renderGears();
            renderControls();
            updateStatusMessage();
        }

        function checkDailyReset() {
            const today = new Date().toLocaleDateString();
            const lastReset = localStorage.getItem('lifeGearsResetDate');
            
            if (lastReset !== today) {
                lifeData.forEach(gear => {
                    gear.items.forEach(item => {
                        if (item.hasCheck) item.isChecked = false;
                    });
                });
                localStorage.setItem('lifeGearsResetDate', today);
                saveData();
            }
        }

        function renderGears() {
            const container = document.getElementById('gears-container');
            container.innerHTML = '';

            lifeData.forEach((gear, index) => {
                const spinClass = index % 2 === 0 ? 'spin-cw' : 'spin-ccw';
                const stoppedClass = gear.active ? '' : 'stopped';
                
                const wrapper = document.createElement('div');
                wrapper.className = `gear-wrapper ${stoppedClass}`;
                wrapper.id = `wrapper-${gear.id}`;
                wrapper.onclick = () => openModal(gear.id);

                wrapper.innerHTML = `
                    <svg class="gear-svg ${spinClass}" viewBox="0 0 100 100" style="stroke: ${gear.color}">
                        <path d="M50 15 A35 35 0 1 0 50 85 A35 35 0 1 0 50 15 M50 35 A15 15 0 1 1 50 65 A15 15 0 1 1 50 35 M50 5 L50 15 M50 85 L50 95 M5 50 L15 50 M85 50 L95 50 M18 18 L25 25 M75 75 L82 82 M18 82 L25 75 M75 25 L82 18" stroke-linecap="round"/>
                    </svg>
                    <span class="gear-name">${gear.name}</span>
                `;
                container.appendChild(wrapper);
            });
        }

        function renderControls() {
            const group = document.getElementById('toggle-group');
            group.innerHTML = '';

            lifeData.forEach(gear => {
                const btn = document.createElement('button');
                btn.className = `toggle-btn ${gear.active ? 'active' : ''}`;
                btn.innerText = gear.name;
                btn.onclick = () => togglePower(gear.id);
                group.appendChild(btn);
            });
        }

        function togglePower(gearId) {
            const gear = lifeData.find(g => g.id === gearId);
            gear.active = !gear.active;
            saveData();
            renderGears();
            renderControls();
            updateStatusMessage();
        }

        function updateStatusMessage() {
            const total = lifeData.length;
            const activeCount = lifeData.filter(g => g.active).length;
            const msgEl = document.getElementById('status-msg');
            
            if (total === 0) {
                msgEl.innerHTML = "등록된 톱니바퀴가 없습니다.<br>기어를 추가해보세요.";
            } else if (activeCount === total) {
                msgEl.innerHTML = `${total}개의 톱니바퀴가 완벽하게 맞물려<br>당신의 삶을 이끌고 있습니다.`;
            } else if (activeCount > 0) {
                msgEl.innerHTML = `잠시 멈춘 부분도 있지만,<br>남은 ${activeCount}개의 톱니바퀴가 인생을 굴러가게 합니다.`;
            } else {
                msgEl.innerHTML = "모든 톱니바퀴가 멈췄습니다.<br>지금은 잠시 푹 쉬어가도 괜찮습니다.";
            }
        }

        function addNewGear() {
            const name = prompt("새로운 톱니바퀴의 이름을 입력하세요:");
            if (name && name.trim() !== "") {
                
                // 1. 현재 사용 중인 색상 수집
                const usedColors = lifeData.map(g => g.color);
                
                // 2. 전체 팔레트에서 아직 사용되지 않은 색상만 순서대로 추려내기
                const availableColors = colorPalette.filter(c => !usedColors.includes(c));
                
                let newColor;
                if (availableColors.length > 0) {
                    // 3. 무조건 배열 앞쪽에 있는 근본 색상부터 1순위로 배정
                    newColor = availableColors[0];
                } else {
                    // 4. 색상을 모두 썼다면 랜덤 배정
                    newColor = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                }
                
                const newGear = {
                    id: 'gear_' + Date.now(),
                    name: name.trim(),
                    active: true,
                    color: newColor,
                    items: []
                };
                lifeData.push(newGear);
                saveData();
                renderGears();
                renderControls();
                updateStatusMessage();
            }
        }

        function deleteCurrentGear() {
            const gearIndex = lifeData.findIndex(g => g.id === currentGearId);
            const gearName = lifeData[gearIndex].name;
            
            if(confirm(`'${gearName}' 톱니바퀴를 정말 삭제하시겠습니까?`)) {
                lifeData.splice(gearIndex, 1);
                saveData();
                closeModal();
                renderGears();
                renderControls();
                updateStatusMessage();
            }
        }

        function openModal(gearId) {
            currentGearId = gearId;
            const gear = lifeData.find(g => g.id === gearId);
            
            document.getElementById('modal-title').innerText = gear.name;
            document.getElementById('modal').classList.add('show');
            document.getElementById('item-input').value = '';
            document.getElementById('use-checklist').checked = true;
            renderList();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            currentGearId = '';
        }

        function renderList() {
            const listEl = document.getElementById('item-list');
            listEl.innerHTML = '';
            
            const gear = lifeData.find(g => g.id === currentGearId);
            
            gear.items.forEach((item, index) => {
                const li = document.createElement('li');
                
                let checkboxHTML = '';
                let textClass = 'item-text';

                if (item.hasCheck) {
                    const checkedAttr = item.isChecked ? 'checked' : '';
                    checkboxHTML = `<input type="checkbox" class="custom-checkbox" onchange="toggleItemCheck(${index})" ${checkedAttr}>`;
                    if (item.isChecked) textClass += ' checked';
                }

                li.innerHTML = `
                    <div class="item-content">
                        ${checkboxHTML}
                        <span class="${textClass}">${item.text}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteItem(${index})">삭제</button>
                `;
                listEl.appendChild(li);
            });
        }

        function addItem() {
            const input = document.getElementById('item-input');
            const useChecklist = document.getElementById('use-checklist').checked;
            const val = input.value.trim();
            
            if(val) {
                const gear = lifeData.find(g => g.id === currentGearId);
                gear.items.push({
                    text: val,
                    hasCheck: useChecklist,
                    isChecked: false
                });
                saveData();
                renderList();
                input.value = '';
            }
        }

        function toggleItemCheck(index) {
            const gear = lifeData.find(g => g.id === currentGearId);
            gear.items[index].isChecked = !gear.items[index].isChecked;
            saveData();
            renderList();
        }

        function handleKeyPress(e) {
            if(e.key === 'Enter') addItem();
        }

        function deleteItem(index) {
            const gear = lifeData.find(g => g.id === currentGearId);
            gear.items.splice(index, 1);
            saveData();
            renderList();
        }

        function saveData() {
            localStorage.setItem('lifeGearsDataV2', JSON.stringify(lifeData));
        }

        init();
    </script>
</body>
</html>
